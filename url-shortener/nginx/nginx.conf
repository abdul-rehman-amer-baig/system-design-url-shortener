events {
    worker_connections 1024;
}

http {
    # ── Upstream pools ────────────────────────────────────────────────────────
    # Docker Compose service names are used as hostnames inside the shared network.

    upstream write_service {
        server write-service:8000;
    }

    upstream read_service {
        server read-service-1:8001;
        server read-service-2:8001;
        server read-service-3:8001;
    }

    # ── Server block ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ── Write-service routes ───────────────────────────────────────────────

        # POST /urls  →  create a short URL
        # "= /urls" is an exact-match location; it wins over any prefix or regex.
        location = /urls {
            proxy_pass         http://write_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # POST /users  →  create a user
        location = /users {
            proxy_pass         http://write_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Read-service routes ────────────────────────────────────────────────

        # GET /urls/{short_code}  →  resolve / redirect a short URL
        # "~ ^/urls/.+" is a case-sensitive regex; it matches /urls/<anything>.
        # Nginx location priority: exact (=) > regex (~) > prefix (/),
        # so "= /urls" above still wins for the bare /urls path.
        location ~ ^/urls/.+ {
            proxy_pass         http://read_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Swagger UI ────────────────────────────────────────────────────────

        # Write-service docs  →  http://localhost/docs
        location /docs {
            proxy_pass         http://write_service;
            proxy_set_header   Host $host;
        }

        location /openapi.json {
            proxy_pass         http://write_service;
            proxy_set_header   Host $host;
        }

        # Read-service docs  →  http://localhost/read/docs
        location /read/docs {
            proxy_pass         http://read_service;
            proxy_set_header   Host $host;
        }

        location /read/openapi.json {
            proxy_pass         http://read_service;
            proxy_set_header   Host $host;
        }

        # ── Health checks ──────────────────────────────────────────────────────

        # GET /health/write  →  write-service liveness
        location = /health/write {
            proxy_pass         http://write_service/health;
            proxy_set_header   Host $host;
        }

        # GET /health/read  →  read-service liveness
        location = /health/read {
            proxy_pass         http://read_service/health;
            proxy_set_header   Host $host;
        }
    }
}
